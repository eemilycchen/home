<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Blog | Emily</title>
	<style>
	:root {
		--bg: #ffffff;
		--text: #1a1a1a;
		--text-secondary: #555;
		--border: #e5e5e5;
		--link-hover: #d946a8;
	}

	html.dark {
		--bg: #111;
		--text: #e5e5e5;
		--text-secondary: #aaa;
		--border: #2a2a2a;
	}

	* { margin: 0; padding: 0; box-sizing: border-box; }

	body {
		background: var(--bg);
		color: var(--text);
		font-family: "Times New Roman", Times, serif;
		line-height: 1.7;
		-webkit-font-smoothing: antialiased;
	}

	.container {
		max-width: 816px;
		margin: 0 auto;
		padding: 0 24px;
	}

	nav {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 20px 0;
		border-bottom: 1px solid var(--border);
		margin-bottom: 48px;
	}
	nav .site-name {
		font-weight: 600;
		font-size: 1.05rem;
		color: var(--text);
		text-decoration: none;
	}
	nav .nav-links {
		display: flex;
		gap: 24px;
	}
	nav .nav-links a {
		color: var(--text-secondary);
		text-decoration: none;
		font-size: 0.95rem;
		transition: color 0.2s;
	}
	nav .nav-links a:hover { color: var(--text); }
	.theme-toggle {
		background: none;
		border: 1px solid var(--border);
		border-radius: 6px;
		padding: 4px 8px;
		cursor: pointer;
		font-size: 1rem;
		line-height: 1;
		color: var(--text);
		transition: border-color 0.2s;
	}
	.theme-toggle:hover { border-color: var(--text-secondary); }

	h1 {
		font-size: 1.6rem;
		font-weight: 700;
		margin-bottom: 32px;
	}

	.post-list {
		list-style: none;
	}
	.post-item {
		padding: 24px 0;
		border-bottom: 1px solid var(--border);
	}
	.post-item:first-child {
		padding-top: 0;
	}
	.post-date {
		font-size: 0.85rem;
		color: var(--text-secondary);
		margin-bottom: 4px;
	}
	.post-title {
		font-size: 1.1rem;
		font-weight: 600;
	}
	.post-title a {
		color: var(--text);
		text-decoration: none;
		transition: color 0.2s;
	}
	.post-title a:hover { color: var(--link-hover); }
	.post-summary {
		font-size: 0.9rem;
		color: var(--text-secondary);
		margin-top: 6px;
		line-height: 1.6;
	}

	.empty-state {
		color: var(--text-secondary);
		font-size: 0.95rem;
		font-style: italic;
	}

	footer {
		border-top: 1px solid var(--border);
		margin-top: 48px;
		padding: 24px 0;
		text-align: center;
		font-size: 0.8rem;
		color: var(--text-secondary);
	}
	</style>
</head>

<body>
<div class="container">

	<nav>
		<a class="site-name" href="index.html">Emily's Home</a>
		<div class="nav-links">
			<a href="blog.html">Blog</a>
			<a href="mailto:emc001@ucsd.edu">Contact</a>
			<button class="theme-toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">&#9790;</button>
		</div>
	</nav>

	<h1>Blog</h1>

	<!-- <p class="empty-state">Posts coming soon. Check back later!</p> -->
	<ul class="post-list"></ul>
		<li class="post-item">
				<div class="post-date">May 7, 2026</div>
				<div class="post-title"><a href="blog/5-7-2026.html">I'm at the Microsoft Office!</a></div>
				<p class="post-summary">Quality groundwork and purpose-driven agents are the foundation for building technology that actually matters for people.</p>
		</li>
		
	</ul>
	<!--
	To add a post, copy this template inside <ul class="post-list">:

	<li class="post-item">
		<div class="post-date">May 5, 2026</div>
		<div class="post-title"><a href="blog/my-post.html">Post Title Here</a></div>
		<p class="post-summary">A short summary of the post.</p>
	</li>
	-->
	</ul>

	<footer>
		Last updated May 2026
	</footer>

</div>
<script>
function toggleTheme() {
	document.documentElement.classList.toggle('dark');
	var isDark = document.documentElement.classList.contains('dark');
	localStorage.setItem('theme', isDark ? 'dark' : 'light');
	document.querySelector('.theme-toggle').textContent = isDark ? '\u2609' : '\u263E';
}
(function() {
	var saved = localStorage.getItem('theme');
	var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
	if (saved === 'dark' || (!saved && prefersDark)) {
		document.documentElement.classList.add('dark');
		document.addEventListener('DOMContentLoaded', function() {
			document.querySelector('.theme-toggle').textContent = '\u2609';
		});
	}
})();
</script>
</body>
</html>
